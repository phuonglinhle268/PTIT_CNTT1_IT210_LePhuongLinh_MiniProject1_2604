<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${todo.id != null} ? 'Cập nhật công việc' : 'Thêm công việc'">Form</h2>

    <form th:action="@{/save}" method="post" th:object="${todo}">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Nội dung</label>
            <input type="text" class="form-control" th:field="*{content}">
            <p style="color:red" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
        </div>

        <div class="form-group">
            <label>Hạn</label>
            <input type="date" class="form-control" th:field="*{dueDate}">
            <p style="color:red" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></p>
        </div>

        <div class="form-group">
            <label>Trạng thái</label>
            <select class="form-control" th:field="*{status}">
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
            </select>
        </div>

        <div class="form-group">
            <label>Ưu tiên</label>
            <select class="form-control" th:field="*{priority}">
                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">
            <span th:text="${todo.id != null} ? 'Cập nhật' : 'Thêm mới'">Submit</span>
        </button>
        <a class="btn btn-secondary" th:href="@{/}">Quay lại</a>
    </form>
</div>
</body>
</html>
